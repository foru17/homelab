[custom]

; ==========================================================
; ZUOLUOTV Surge - 个人全端配置
; - 单跳直连，无链路/双跳优化（区别于 OpenClash 网关配置）
; - 策略组命名与 OpenClash 保持一致
; - 节点源与 OpenClash 共享（sub-surge.yaml = openclash audience）
; - emoji=false，节点名不带国旗前缀，保证正则匹配一致
; ==========================================================


; =========================
; 1) Rulesets
; 命中顺序与 OpenClash 一致:
;   自定义 → AI → 视频 → 音乐 → 社交 → 开发者 → 大厂 → 国内 → 兜底
; =========================

; 自定义规则（最高优先级）
ruleset=奇葩流量,https://raw.githubusercontent.com/foru17/homelab/main/clash/Magic.list
ruleset=国内流量,https://raw.githubusercontent.com/foru17/homelab/main/clash/Direct.list

; AI 服务（OverseasAI 聚合规则集，覆盖 ChatGPT/Claude/Gemini/Copilot/Cursor 等）
ruleset=AI,https://raw.githubusercontent.com/foru17/homelab/main/clash/AI.list
ruleset=AI,https://raw.githubusercontent.com/viewer12/OverseasAI.list/main/rule/Clash/OverseasAI/OverseasAI.list

; 视频/流媒体（YouTube 在 Google 之前，防止被归入谷歌服务）
ruleset=YouTube,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.yaml
ruleset=Netflix,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix.yaml
ruleset=TikTok,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/TikTok/TikTok.yaml

; 音乐
ruleset=Spotify,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Spotify/Spotify.yaml

; 社交/通讯
ruleset=Telegram,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.yaml
ruleset=欧美社交,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Twitter/Twitter.yaml
ruleset=欧美社交,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Discord/Discord.yaml

; 开发者工具
ruleset=GitHub,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.yaml

; 大厂服务（Google 必须在 AI/YouTube 之后，只接管剩余 Google 流量）
ruleset=谷歌服务,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.list
ruleset=微软服务,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Microsoft/Microsoft.yaml
ruleset=苹果服务,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Apple/Apple.yaml

; 国内补强
ruleset=国内流量,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=国内流量,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=国内流量,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Lan/Lan.yaml
ruleset=国内流量,[]GEOIP,LAN,no-resolve
ruleset=国内流量,[]GEOIP,CN,no-resolve

; 最终兜底
ruleset=漏网之鱼,[]FINAL


; =========================
; 2) Proxy Groups
; =========================

; ---------- 基础操作组 ----------
custom_proxy_group=手动选择`select`.*
custom_proxy_group=自动选择`url-test`(^(?!.*(LAN|FREE|WARP|365|XXQG|PCCW|Transit|Home)).*)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=自建节点`fallback`(^(?!.*(LAN|FREE|Home)).*)`http://www.gstatic.com/generate_204`300,,50

; ---------- 回家出口 ----------
custom_proxy_group=🏠 东莞出口`select`(?i)(DG\s*Home).*
custom_proxy_group=🏠 深圳出口`select`(?i)(SZ\s*Home).*

; ---------- 国家出口（单跳，命名与 OpenClash 一致）----------
custom_proxy_group=🇭🇰 香港出口`select`(?i)^HK\s.*
custom_proxy_group=🇯🇵 日本出口`select`(?i)^JP\s.*
custom_proxy_group=🇺🇸 美国出口`select`(?i)^US\s.*

; ---------- 总出口 ----------
custom_proxy_group=国外流量`select`[]自建节点`[]自动选择`[]🇺🇸 美国出口`[]🇯🇵 日本出口`[]🇭🇰 香港出口`[]手动选择`[]DIRECT
custom_proxy_group=国内流量`select`[]DIRECT`[]🏠 东莞出口`[]🏠 深圳出口`[]国外流量

; ---------- 业务组（默认出口与 OpenClash 对齐）----------
custom_proxy_group=奇葩流量`select`[]国外流量`[]自建节点`[]🇺🇸 美国出口`[]🇯🇵 日本出口`[]🇭🇰 香港出口`[]DIRECT

custom_proxy_group=AI`select`[]🇺🇸 美国出口`[]🇯🇵 日本出口`[]🇭🇰 香港出口`[]自建节点`[]国外流量`[]DIRECT

custom_proxy_group=YouTube`select`[]🇯🇵 日本出口`[]🇭🇰 香港出口`[]🇺🇸 美国出口`[]自建节点`[]国外流量`[]DIRECT

custom_proxy_group=Netflix`select`[]🇯🇵 日本出口`[]🇺🇸 美国出口`[]🇭🇰 香港出口`[]自建节点`[]国外流量`[]DIRECT

custom_proxy_group=Spotify`select`[]🇭🇰 香港出口`[]🇯🇵 日本出口`[]🇺🇸 美国出口`[]自建节点`[]国外流量`[]DIRECT

custom_proxy_group=TikTok`select`[]🇯🇵 日本出口`[]🇺🇸 美国出口`[]🇭🇰 香港出口`[]自建节点`[]国外流量`[]DIRECT

custom_proxy_group=Telegram`select`[]🇭🇰 香港出口`[]🇯🇵 日本出口`[]🇺🇸 美国出口`[]自建节点`[]国外流量`[]DIRECT

custom_proxy_group=欧美社交`select`[]🇺🇸 美国出口`[]🇯🇵 日本出口`[]🇭🇰 香港出口`[]自建节点`[]国外流量`[]DIRECT

custom_proxy_group=GitHub`select`[]🇺🇸 美国出口`[]🇯🇵 日本出口`[]🇭🇰 香港出口`[]自建节点`[]国外流量`[]DIRECT

custom_proxy_group=谷歌服务`select`[]🇯🇵 日本出口`[]🇭🇰 香港出口`[]🇺🇸 美国出口`[]自建节点`[]国外流量`[]DIRECT

custom_proxy_group=微软服务`select`[]DIRECT`[]🇺🇸 美国出口`[]自建节点`[]国外流量

custom_proxy_group=苹果服务`select`[]DIRECT`[]🇭🇰 香港出口`[]🇯🇵 日本出口`[]自建节点`[]国外流量

; ---------- 兜底 ----------
custom_proxy_group=漏网之鱼`select`[]国外流量`[]国内流量`[]DIRECT


; =========================
; 3) Generator Switch
; =========================
enable_rule_generator=true
overwrite_original_rules=true
