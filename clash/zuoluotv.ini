[custom]

; ==========================================================
; ZUOLUOTV Surge - 个人全端配置
; - 单跳直连，无链路/双跳优化（区别于 OpenClash 网关配置）
; - 策略组命名与 OpenClash 保持一致
; - 节点源与 OpenClash 共享（sub-surge.yaml = openclash audience）
; - emoji=false，节点名不带国旗前缀，保证正则匹配一致
; ==========================================================


; =========================
; 1) Rulesets
; 命中顺序与 OpenClash 一致:
;   回家LAN → 自定义 → AI → 视频 → 音乐 → 社交 → 开发者 → 大厂 → 国内 → 兜底
; =========================

; 回家内网（最高优先级，不能被后面的 LAN/GEOIP 规则吞掉）
; - 10.0.0.0/24    → DG 东莞家 LAN
; - 192.168.101.0/24 → SZ 深圳家 LAN
ruleset=🏠 东莞出口,[]IP-CIDR,10.0.0.0/24,no-resolve
ruleset=🏠 深圳出口,[]IP-CIDR,192.168.101.0/24,no-resolve

; 站点出口偏好（自维护清单：站点风控挑出口 IP、须强制走香港的收进 ForceHK.list，
; 追加域名即可，无需改 ini；如 NodeSeek 2026-07-06）
ruleset=🇭🇰 香港出口,https://raw.githubusercontent.com/foru17/homelab/main/clash/ForceHK.list

; 自定义规则
ruleset=奇葩流量,https://raw.githubusercontent.com/foru17/homelab/main/clash/Magic.list
ruleset=国内流量,https://raw.githubusercontent.com/foru17/homelab/main/clash/Direct.list

; AI 服务（OverseasAI 聚合规则集，覆盖 ChatGPT/Claude/Gemini/Copilot/Cursor 等）
ruleset=AI,https://raw.githubusercontent.com/foru17/homelab/main/clash/AI.list
ruleset=AI,https://raw.githubusercontent.com/viewer12/OverseasAI.list/main/rule/Clash/OverseasAI/OverseasAI.list

; 视频/流媒体（YouTube 在 Google 之前，防止被归入谷歌服务）
ruleset=YouTube,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.yaml
ruleset=Netflix,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix.yaml
ruleset=TikTok,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/TikTok/TikTok.yaml

; 音乐
ruleset=Spotify,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Spotify/Spotify.yaml

; 社交/通讯
ruleset=Telegram,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.yaml
ruleset=欧美社交,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Twitter/Twitter.yaml
ruleset=欧美社交,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Discord/Discord.yaml

; 开发者工具
ruleset=GitHub,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.yaml

; Crypto/Web3（交易所 + 链上前端；专项列表在聚合列表之前）
; 2026-07 调研：Binance/OKX/Bybit/Kraken 四家仅台湾出口全绿（美=Binance/Bybit 封锁，港=OKX/Bybit 退出）
; 注意：全部用 .list 文本源——subconverter 的 surge 目标会静默丢弃 clash-classic(yaml) 规则源
ruleset=Crypto,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Binance/Binance.list
ruleset=Crypto,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OKX/OKX.list
ruleset=Crypto,https://raw.githubusercontent.com/dler-io/Rules/main/Surge/Surge%203/Provider/Crypto.list
ruleset=Crypto,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Crypto/Crypto.list

; 大厂服务（Google 必须在 AI/YouTube 之后，只接管剩余 Google 流量）
ruleset=谷歌服务,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.list
ruleset=微软服务,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Microsoft/Microsoft.yaml
ruleset=苹果服务,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Apple/Apple.yaml

; 国内补强
ruleset=国内流量,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=国内流量,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=国内流量,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Lan/Lan.yaml
ruleset=国内流量,[]GEOIP,LAN,no-resolve
ruleset=国内流量,[]GEOIP,CN,no-resolve

; 最终兜底
ruleset=漏网之鱼,[]FINAL


; =========================
; 2) Proxy Groups
; =========================
; 顺序原则: 主入口(国外/国内流量)优先 → 基础池 → 家庭出口 → 链路构件 →
;          国家出口 → 业务组 → 兜底
; mihomo/zashboard 严格按 YAML 物理顺序展示, 这里的顺序就是面板顺序

; ---------- 总出口 (主入口, 排第一) ----------
; 命名跟 DG 家 ZUOLUOTV.yaml 1:1 对齐
custom_proxy_group=国外流量`select`[]自动选择`[]自建直连`[]IEPL 直连`[]深港聚合`[]CNIX 双路`[]CNIX 直连`[]🇺🇸 美国出口`[]🇯🇵 日本出口`[]🇭🇰 香港出口`[]手动选择`[]DIRECT
custom_proxy_group=国内流量`select`[]DIRECT`[]🏠 东莞出口`[]🏠 深圳出口`[]国外流量

; ---------- 基础操作组 (跟 DG 家命名对齐) ----------
custom_proxy_group=手动选择`select`.*
custom_proxy_group=自动选择`url-test`(^(?!.*(LAN|FREE|WARP|365|XXQG|PCCW|Transit|Home|CNExit|Split)).*)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=自建直连`select`(^(?!.*(LAN|FREE)).*)

; ---------- 回家出口 ----------
; 默认排 IPv4 可达节点（ESA/CDN 443+TLS）打头，IPv6-only 与 LAN(仅在家可达) 垫底，
; 保证免流/外地 IPv4 蜂窝下默认就能回家；仍是 select，可手动切换。
custom_proxy_group=🏠 东莞出口`select`[]DG Home ESA`[]DG Home Direct`[]DG Home Edge`[]DG Home IPv4`[]DG Home Transit`[]DG Home IPv6
custom_proxy_group=🏠 深圳出口`select`[]SZ Home ESA`[]SZ Home QCloud`[]SZ Home Edge`[]SZ Home Direct`[]SZ Home IPv6

; ---------- CNIX 腾讯云入口（深港 IPLC，落地同 bage 209.33.161.58）----------
; 2026-06-08 双路回归：GZ-A(v2.gz.43x1.com) + GZ-B(v2.gzb.43x1.com/123.207.20.48) 双入口。
; Missuo(129) 二入口已于 2026-06-06 到期下线、Ali 早前退役；GZB 接替第二入口。
; `CNIX 双路` load-balance(round-robin) 在 GZ-A + GZ-B 两入口间逐连接聚合带宽（对齐网关 CNIX 双路）；
; `CNIX 直连` url-test 在 HK Bage CNIX(GZ-A) / GZB(GZ-B) / Cover 间取最快单路（低延迟/HA 兜底）；
; 区域优化组(香港/日本/美国优化) 的 (CNIX|...) 正则会自动并入各区 GZB 节点 → 双路优化。
custom_proxy_group=CNIX 双路`load-balance`(?i)^(?:🇭🇰\s+)?HK Bage CNIX( GZB)?$`http://www.gstatic.com/generate_204`300
custom_proxy_group=CNIX 直连`url-test`(?i)^(?:🇭🇰\s+)?HK Bage CNIX( Cover| GZB)?$`http://www.gstatic.com/generate_204`300,,50

; ---------- IEPL HyperPods 入口（深港电信 IEPL, 落地同 bage, CNIX 同档备份, 2026-06-29）----------
; 与 CNIX 物理独立的第二条深港专线（深圳电信 IEPL 300M）。HyperPods 共享 NAT 只可靠给 IPv6，公网 IPv4 转发不可靠(IP 漂移)，
; 故入口 = ESA(esa-szx-ctnat.is26.com:443 阿里云ESA CDN 回源机器IPv6) + v6(szx-ipv6.is26.com:3600 直连IPv6) + Edge(EdgeOne 兜底)。
; 链路: 入口 → SZ box xray(:3600 双栈) → ss-2022 →[深港IEPL 私网10.x 1.5ms]→ HK box realm(216.235.241.159:3601) → bage:8388。
; `IEPL 直连` 只纳入高吞吐入口(ESA ~278M/110ms / v6 ~270M/60ms)，按延迟 url-test 取最快；
;   Edge(~6M EdgeOne 限速)排除出组、仅 香港出口 手选兜底，避免 url-test 因 Edge 延迟低却吞吐差而误选。
custom_proxy_group=IEPL 直连`url-test`(?i)^(?:🇭🇰\s+)?HK Bage IEPL (ESA|v6)$`http://www.gstatic.com/generate_204`300,,50

; 深港聚合: CNIX(GZ-A/B)+IEPL(ESA/v6) round-robin 聚合两条专线带宽（都落地 bage，出口不漂移），压满多线带宽时手选。
; 注: LB 测不出"限速"，峰时仍有部分连接踩腾讯；纯避晚高峰限速用 IEPL 直连。
custom_proxy_group=深港聚合`load-balance`(?i)^(?:🇭🇰\s+)?HK Bage (CNIX( GZB)?|IEPL (ESA|v6))$`http://www.gstatic.com/generate_204`300

; ---------- 国家出口（每区 优化 url-test 打头 + 全节点手动池）----------
; 优化 = 该区 CNIX/IEPL(深港真专线) + CDN(ESA/Edge/CF) 之间 url-test 自动取最快；
; 负向预查排除 SMART/Split(clashctl 内网桥)、WARP(洗白变种非测速)、LAN/FREE。
; 2026-06-29: IEPL 回归（HyperPods 深港电信 IEPL，落地同 bage，与 CNIX 同档）→ HK 优化层加入 IEPL token。
; subconverter emoji=true 会给国家节点加 🇭🇰/🇯🇵/🇺🇸 前缀；正则容忍可选前缀
custom_proxy_group=🇭🇰 香港优化`url-test`(?i)^(?:🇭🇰\s+)?HK\s(?!.*(SMART|Split|WARP|LAN|FREE)).*(CNIX|IEPL|ESA|Edge|CF)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本优化`url-test`(?i)^(?:🇯🇵\s+)?JP\s(?!.*(SMART|Split|WARP|LAN|FREE)).*(CNIX|ESA|Edge|CF)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国优化`url-test`(?i)^(?:🇺🇸\s+)?US\s(?!.*(SMART|Split|WARP|LAN|FREE)).*(CNIX|ESA|Edge|CF)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇭🇰 香港出口`select`[]🇭🇰 香港优化`(?i)^(?:🇭🇰\s+)?HK\s.*
custom_proxy_group=🇯🇵 日本出口`select`[]🇯🇵 日本优化`(?i)^(?:🇯🇵\s+)?JP\s.*
custom_proxy_group=🇺🇸 美国出口`select`[]🇺🇸 美国优化`(?i)^(?:🇺🇸\s+)?US\s.*
; 台湾出口：TW 节点仅在 Wakuwaku(missuo) 订阅里，只有 surge 输出（merge missuo-sub）会命中；
; 其它输出（clash/quanx 用 sub-public 自建池）无 TW 节点，[]国外流量 兜底防空组
custom_proxy_group=🇹🇼 台湾出口`select`(?i)^(?:🇹🇼\s+)?TW\s.*`[]国外流量

; ---------- 业务组（默认出口与 OpenClash 对齐）----------
custom_proxy_group=奇葩流量`select`[]国外流量`[]自建直连`[]🇺🇸 美国出口`[]🇯🇵 日本出口`[]🇭🇰 香港出口`[]DIRECT

custom_proxy_group=AI`select`[]🇺🇸 美国出口`[]🇯🇵 日本出口`[]🇭🇰 香港出口`[]自建直连`[]国外流量`[]DIRECT

custom_proxy_group=YouTube`select`[]🇯🇵 日本出口`[]🇭🇰 香港出口`[]🇺🇸 美国出口`[]自建直连`[]国外流量`[]DIRECT

custom_proxy_group=Netflix`select`[]🇯🇵 日本出口`[]🇺🇸 美国出口`[]🇭🇰 香港出口`[]自建直连`[]国外流量`[]DIRECT

custom_proxy_group=Spotify`select`[]🇭🇰 香港出口`[]🇯🇵 日本出口`[]🇺🇸 美国出口`[]自建直连`[]国外流量`[]DIRECT

custom_proxy_group=TikTok`select`[]🇯🇵 日本出口`[]🇺🇸 美国出口`[]🇭🇰 香港出口`[]自建直连`[]国外流量`[]DIRECT

custom_proxy_group=Telegram`select`[]🇭🇰 香港出口`[]🇯🇵 日本出口`[]🇺🇸 美国出口`[]自建直连`[]国外流量`[]DIRECT

custom_proxy_group=欧美社交`select`[]🇺🇸 美国出口`[]🇯🇵 日本出口`[]🇭🇰 香港出口`[]自建直连`[]国外流量`[]DIRECT

custom_proxy_group=GitHub`select`[]🇺🇸 美国出口`[]🇯🇵 日本出口`[]🇭🇰 香港出口`[]自建直连`[]国外流量`[]DIRECT

; Crypto：台湾优先（四大所全绿区）；交易所风控对 IP 跳区敏感，选定后别频繁切换
custom_proxy_group=Crypto`select`[]🇹🇼 台湾出口`[]🇭🇰 香港出口`[]🇯🇵 日本出口`[]🇺🇸 美国出口`[]自建直连`[]国外流量`[]DIRECT

custom_proxy_group=谷歌服务`select`[]🇯🇵 日本出口`[]🇭🇰 香港出口`[]🇺🇸 美国出口`[]自建直连`[]国外流量`[]DIRECT

custom_proxy_group=微软服务`select`[]DIRECT`[]🇺🇸 美国出口`[]自建直连`[]国外流量

custom_proxy_group=苹果服务`select`[]DIRECT`[]🇭🇰 香港出口`[]🇯🇵 日本出口`[]自建直连`[]国外流量

; ---------- 兜底 ----------
custom_proxy_group=漏网之鱼`select`[]国外流量`[]国内流量`[]DIRECT


; =========================
; 3) Generator Switch
; =========================
enable_rule_generator=true
overwrite_original_rules=true
